name: User Service CI

on:
  push:
    branches: [main]
    paths: ['user-service/**']
  pull_request:
    branches: [main]
    paths: ['user-service/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Test
        run: ./gradlew build
        working-directory: user-service
