name: Gateway CI

on:
  push:
    branches: [main]
    paths: ['gateway/**']
  pull_request:
    branches: [main]
    paths: ['gateway/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: gateway/src/ColdCase.Gateway

      - name: Build
        run: dotnet build --no-restore
        working-directory: gateway/src/ColdCase.Gateway

      - name: Test
        run: dotnet test --no-build --verbosity normal
        working-directory: gateway/src/ColdCase.Gateway.Tests
