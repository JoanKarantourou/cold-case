name: Public Site CI

on:
  push:
    branches: [main]
    paths: ['public-site/**']
  pull_request:
    branches: [main]
    paths: ['public-site/**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: public-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: public-site

      - name: Build
        run: npm run build
        working-directory: public-site
