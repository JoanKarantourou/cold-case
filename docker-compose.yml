version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: coldcase-postgres
    environment:
      POSTGRES_DB: coldcase
      POSTGRES_USER: coldcase
      POSTGRES_PASSWORD: coldcase_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldcase"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: coldcase-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: coldcase
      RABBITMQ_DEFAULT_PASS: coldcase_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coldcase-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: coldcase-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__user-service__Destinations__default__Address=http://user-service:8080
      - ReverseProxy__Clusters__ai-service__Destinations__default__Address=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: coldcase-user-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/coldcase?currentSchema=users
      - SPRING_DATASOURCE_USERNAME=coldcase
      - SPRING_DATASOURCE_PASSWORD=coldcase_dev
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: coldcase-ai-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://coldcase:coldcase_dev@postgres:5432/coldcase
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coldcase-frontend
    ports:
      - "4200:4200"
    depends_on:
      - gateway

  public-site:
    build:
      context: ./public-site
      dockerfile: Dockerfile
    container_name: coldcase-public-site
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    container_name: coldcase-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gateway
      - frontend
      - public-site

volumes:
  postgres-data:
